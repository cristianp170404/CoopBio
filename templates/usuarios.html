<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usuarios – Cooperadora Escolar</title>
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="layout">
  <main class="main-content">
    <header class="topbar">
      <div><h1 class="page-title">Usuarios</h1><p class="page-subtitle">Iniciar sesión y administrar usuarios</p></div>
      <div class="topbar-actions"></div>
    </header>
    <div class="page-content">
      <div style="max-width:420px;margin:8px 0">
        <div class="card">
          <div style="margin-bottom:8px;font-weight:700">Iniciar sesión</div>
          <div class="form-group"><label class="form-label">Email</label><input id="login-email" type="email"></div>
          <div class="form-group"><label class="form-label">Clave</label><input id="login-pass" type="password"></div>
          <div style="display:flex;gap:8px"><button class="btn btn-primary" onclick="login()">Entrar</button><button class="btn" onclick="logout()">Cerrar sesión</button></div>
          <div id="login-msg" style="margin-top:8px;color:var(--text-3)"></div>
        </div>
      </div>

      <div id="admin-area" style="display:none;margin-top:12px">
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center"><strong>Usuarios existentes</strong><button class="btn" onclick="recargarUsers()">Recargar</button></div>
          <table class="table" style="margin-top:8px"><thead><tr><th>Email</th><th>Activo</th><th style="width:160px"></th></tr></thead><tbody id="tbody-users"></tbody></table>
        </div>
        <div class="card" style="margin-top:12px">
          <div style="font-weight:700">Crear usuario</div>
          <div class="form-group"><label class="form-label">Email</label><input id="new-email" type="email"></div>
          <div class="form-group"><label class="form-label">Clave</label><input id="new-pass" type="password"></div>
          <div style="display:flex;gap:8px"><button class="btn btn-primary" onclick="crearUser()">Crear</button></div>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="toast"></div>
<script src="/static/api.js"></script>
<script src="/static/sidebar.js"></script>
<script>
function showAdminArea(on){ document.getElementById('admin-area').style.display=on?'block':'none'; }
async function login(){ var e=document.getElementById('login-email').value; var p=document.getElementById('login-pass').value; try{ var r=await API.post('/api/login',{email:e,password:p}); document.getElementById('login-msg').textContent='Conectado: '+r.email; localStorage.setItem('user',JSON.stringify(r)); showAdminArea(true); recargarUsers(); }catch(err){ showToast(err.message,'error'); } }
function logout(){ localStorage.removeItem('user'); document.getElementById('login-msg').textContent=''; showAdminArea(false); }
async function recargarUsers(){ try{ var data=await API.get('/api/users'); document.getElementById('tbody-users').innerHTML=data.map(u=>`<tr><td>${u.email}</td><td>${u.activo? 'Sí':'No'}</td><td style="display:flex;gap:6px"><button class="btn btn-sm" onclick="editarUserPrompt(${u.id},'${u.email}')">Editar</button></td></tr>`).join(''); }catch(e){showToast(e.message,'error');} }
function editarUserPrompt(id,email){ var nuevo=prompt('Nuevo email',email); if(!nuevo) return; var pw=prompt('Nueva clave (dejar vacío para no cambiar)'); API.put('/api/users/'+id,{email:nuevo,password:pw}).then(()=>{showToast('Usuario actualizado');recargarUsers();}).catch(e=>showToast(e.message,'error')) }
async function crearUser(){ var e=document.getElementById('new-email').value; var p=document.getElementById('new-pass').value; if(!e||!p){showToast('Complete email y clave','error');return;} try{ await API.post('/api/users',{email:e,password:p}); showToast('Usuario creado'); document.getElementById('new-email').value=''; document.getElementById('new-pass').value=''; recargarUsers(); }catch(e){showToast(e.message,'error');} }
// si ya hay user en localStorage
if(localStorage.getItem('user')){ showAdminArea(true); recargarUsers(); }
</script>
</body>
</html>
