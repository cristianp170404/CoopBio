<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eventos – Cooperadora Escolar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css">
<style>
.ev-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.ev-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.ev-nombre{font-family:'Syne',sans-serif;font-weight:800;font-size:17px}
.ev-meta{font-size:12px;color:var(--text-3);margin-top:3px}
.ev-precios{display:flex;gap:16px;padding:10px 14px;background:var(--surface-2);border-radius:8px;margin-bottom:12px;flex-wrap:wrap}
.ev-precio-item{font-size:12px;color:var(--text-3)}
.ev-precio-item strong{display:block;font-size:15px;font-weight:700;color:var(--text)}
.ev-stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.ev-stat{font-size:11px;color:var(--text-3);text-align:center}
.ev-stat strong{display:block;font-size:18px;font-weight:800;font-family:'Syne',sans-serif;color:var(--text)}
.ev-stat.green strong{color:var(--green)}
.ev-stat.amber strong{color:var(--amber)}
.ev-stat.blue strong{color:var(--blue)}
.ev-stat.purple strong{color:#8b5cf6}
.ev-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.tabs-inner{display:flex;gap:2px;background:var(--surface-2);border-radius:8px;padding:3px;margin-bottom:12px;width:fit-content}
.tab-inner{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text-3)}
.tab-inner.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.12)}
/* Grilla de tarjetas numeradas */
.tarjetas-grid{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.tarj-chip{width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:.15s;user-select:none}
.tarj-chip.libre{background:var(--surface-2);border-color:var(--border);color:var(--text-3)}
.tarj-chip.libre:hover{border-color:var(--blue);color:var(--blue)}
.tarj-chip.venta{background:rgba(16,185,129,.15);border-color:var(--green);color:var(--green)}
.tarj-chip.ganancia{background:rgba(245,158,11,.15);border-color:var(--amber);color:var(--amber)}
.tarj-chip.seleccionado{outline:3px solid var(--blue);outline-offset:1px}
.leyenda{display:flex;gap:12px;font-size:11px;margin-bottom:8px;flex-wrap:wrap}
.leyenda span{display:flex;align-items:center;gap:4px}
.dot{width:10px;height:10px;border-radius:3px}
.entrega-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface-2);border-radius:8px;margin-bottom:6px}
.entrega-info{font-size:13px}
.entrega-num{font-size:11px;color:var(--text-3);margin-top:1px}
/* Reporte */
.rpt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:12px 0}
@media(min-width:500px){.rpt-grid{grid-template-columns:repeat(4,1fr)}}
.rpt-stat{background:var(--surface-2);border-radius:8px;padding:12px;text-align:center}
.rpt-stat .val{font-size:20px;font-weight:800;font-family:'Syne',sans-serif}
.rpt-stat .lbl{font-size:11px;color:var(--text-3);margin-top:2px}
.rpt-stat.green .val{color:var(--green)}
.rpt-stat.amber .val{color:var(--amber)}
.rpt-stat.blue .val{color:var(--blue)}
.rpt-stat.purple .val{color:#8b5cf6}
.nums-pendientes{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.num-badge{padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600;background:rgba(245,158,11,.15);color:var(--amber)}
.num-badge.rendido{background:rgba(16,185,129,.12);color:var(--green)}
</style>
</head>
<body>
<div class="layout">
  <main class="main-content">
    <header class="topbar">
      <div><h1 class="page-title">Eventos</h1><p class="page-subtitle">Gestión de tarjetas y rendiciones</p></div>
      <div class="topbar-actions"><button class="btn btn-primary" onclick="abrirNuevoEvento()">+ Nuevo evento</button></div>
    </header>
    <div class="page-content">
      <div id="lista-eventos"><p style="color:var(--text-3);text-align:center;padding:40px">Cargando...</p></div>
    </div>
  </main>
</div>

<!-- MODAL NUEVO/EDITAR EVENTO -->
<div class="modal-overlay" id="modal-evento">
  <div class="modal">
    <div class="modal-title" id="ev-modal-titulo">Nuevo evento</div>
    <input type="hidden" id="ev-id">
    <div class="form-group"><label class="form-label">Nombre del evento *</label><input type="text" id="ev-nombre" placeholder="Ej: Rifa anual"></div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Fecha</label><input type="text" id="ev-fecha" placeholder="25/05/2026"></div>
      <div class="form-group"><label class="form-label">Tipo</label>
        <select id="ev-tipo"><option>Rifas</option><option>Venta de comida</option><option>Venta de productos</option><option>Sorteo</option><option>Otro</option></select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Descripción</label><input type="text" id="ev-desc" placeholder="Descripción del evento"></div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">💰 Precio de la tarjeta ($)</label><input type="number" id="ev-precio" placeholder="5000" min="0"></div>
      <div class="form-group"><label class="form-label">✨ Ganancia por tarjeta ($)</label><input type="number" id="ev-ganancia" placeholder="2000" min="0"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="cerrar('modal-evento')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarEvento()">Guardar evento</button>
    </div>
  </div>
</div>

<!-- MODAL ENTREGAR TARJETAS -->
<div class="modal-overlay" id="modal-entrega">
  <div class="modal">
    <div class="modal-title">Entregar tarjetas a alumno</div>
    <input type="hidden" id="ent-evento-id">
    <div class="form-group"><label class="form-label">Alumno *</label>
      <select id="ent-alumno"><option value="">Seleccionar alumno...</option></select>
    </div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Tarjeta N° desde *</label><input type="number" id="ent-desde" min="1" placeholder="1" oninput="calcCantidad()"></div>
      <div class="form-group"><label class="form-label">Tarjeta N° hasta *</label><input type="number" id="ent-hasta" min="1" placeholder="10" oninput="calcCantidad()"></div>
    </div>
    <div id="ent-preview" style="font-size:13px;color:var(--text-3);margin-bottom:4px"></div>
    <div class="modal-footer">
      <button class="btn" onclick="cerrar('modal-entrega')">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarEntrega()">Entregar tarjetas</button>
    </div>
  </div>
</div>

<!-- MODAL RENDICION -->
<div class="modal-overlay" id="modal-rendicion">
  <div class="modal" style="max-width:700px">
    <div class="modal-title" id="rend-titulo">Rendición de tarjetas</div>
    <div id="rend-alumno-info" style="font-size:13px;color:var(--text-3);margin-bottom:12px"></div>

    <div class="leyenda">
      <span><div class="dot" style="background:var(--surface-2);border:1.5px solid var(--border)"></div> Sin rendir</span>
      <span><div class="dot" style="background:rgba(16,185,129,.2);border:1.5px solid var(--green)"></div> Rendida – Venta</span>
      <span><div class="dot" style="background:rgba(245,158,11,.2);border:1.5px solid var(--amber)"></div> Rendida – Ganancia</span>
    </div>

    <div class="tarjetas-grid" id="rend-grid"></div>

    <div id="rend-seleccion" style="display:none;margin-top:14px;padding:14px;background:var(--surface-2);border-radius:8px">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px">Marcar tarjetas seleccionadas como:</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <select id="rend-forma" style="max-width:160px">
          <option>Efectivo</option><option>Débito</option><option>Transferencia</option>
        </select>
        <button class="btn btn-primary" onclick="rendirSeleccionados('venta')">✅ Rendida por venta</button>
        <button class="btn" style="background:rgba(245,158,11,.15);color:var(--amber);border-color:var(--amber)" onclick="rendirSeleccionados('ganancia')">💰 Rendida por ganancia</button>
        <button class="btn" onclick="desmarcarSeleccionados()" style="color:var(--red)">✕ Desmarcar</button>
      </div>
      <div id="rend-seleccion-info" style="font-size:12px;color:var(--text-3);margin-top:6px"></div>
    </div>

    <div class="modal-footer" style="margin-top:16px">
      <button class="btn" onclick="cerrar('modal-rendicion')">Cerrar</button>
    </div>
  </div>
</div>

<!-- MODAL REPORTE -->
<div class="modal-overlay" id="modal-reporte">
  <div class="modal" style="max-width:700px">
    <div class="modal-title" id="rpt-titulo">Reporte del evento</div>
    <div id="rpt-body"></div>
    <div class="modal-footer"><button class="btn" onclick="cerrar('modal-reporte')">Cerrar</button></div>
  </div>
</div>

<div id="toast"></div>
<script src="/static/api.js"></script>
<script src="/static/sidebar.js"></script>
<script>
var alumnosLista = [];
var eventoEnRendicion = null;
var tarjetasEnRendicion = [];
var seleccionados = new Set();

function fmt(n){ return Number(n||0).toLocaleString('es-AR'); }

function badgeEstado(e){
  if(e==='Activo') return '<span class="badge badge-green">Activo</span>';
  if(e==='Proximo'||e==='Próximo') return '<span class="badge badge-blue">Próximo</span>';
  return '<span class="badge badge-amber">Finalizado</span>';
}

async function cargarAlumnos(){
  alumnosLista = await API.get('/api/alumnos');
  var sel = document.getElementById('ent-alumno');
  sel.innerHTML = '<option value="">Seleccionar alumno...</option>';
  alumnosLista.forEach(a => sel.innerHTML += `<option value="${a.id}">${a.apellido}, ${a.nombre} (${a.anio})</option>`);
}

async function cargarEventos(){
  try {
    var evs = await API.get('/api/eventos');
    renderEventos(evs);
  } catch(e){ showToast(e.message,'error'); }
}

function renderEventos(evs){
  if(!evs.length){
    document.getElementById('lista-eventos').innerHTML='<p style="color:var(--text-3);text-align:center;padding:40px">No hay eventos registrados.</p>';
    return;
  }
  document.getElementById('lista-eventos').innerHTML = evs.map(ev => {
    var s = ev.stats || {};
    var pendientes = (s.total||0) - (s.rendidas||0);
    var entregasHtml = ev.entregas.length
      ? ev.entregas.map(e => `
          <div class="entrega-row">
            <div>
              <div class="entrega-info"><strong>${e.alumno_txt}</strong></div>
              <div class="entrega-num">Tarjetas ${e.tarjeta_desde} al ${e.tarjeta_hasta} · ${e.cantidad} tarjetas · ${e.tarjetas_rendidas||0}/${e.tarjetas_total||0} rendidas</div>
            </div>
            <div style="display:flex;gap:6px">
              <button class="btn btn-sm btn-primary" onclick="abrirRendicion(${ev.id},${e.alumno_id})">Rendir</button>
              <button class="btn btn-sm" onclick="eliminarEntrega(${ev.id},${e.id})" title="Eliminar entrega">✕</button>
            </div>
          </div>`).join('')
      : '<p style="font-size:13px;color:var(--text-3)">Sin tarjetas entregadas aún.</p>';

    return `<div class="ev-card">
      <div class="ev-header">
        <div>
          <div class="ev-nombre">${ev.nombre}</div>
          <div class="ev-meta">${ev.fecha||'Sin fecha'} · ${ev.tipo}${ev.descripcion?' · '+ev.descripcion:''}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          ${badgeEstado(ev.estado)}
          <button class="btn btn-sm" onclick="editarEvento(${ev.id})">✏️</button>
        </div>
      </div>
      <div class="ev-precios">
        <div class="ev-precio-item"><strong>$${fmt(ev.precio_tarjeta)}</strong>Precio tarjeta</div>
        <div class="ev-precio-item"><strong>$${fmt(ev.ganancia_tarjeta)}</strong>Ganancia por tarjeta</div>
        <div class="ev-precio-item"><strong>$${fmt(ev.precio_tarjeta - ev.ganancia_tarjeta)}</strong>Costo tarjeta</div>
      </div>
      <div class="ev-stats">
        <div class="ev-stat blue"><strong>${s.total||0}</strong>Entregadas</div>
        <div class="ev-stat green"><strong>${s.rendidas||0}</strong>Rendidas</div>
        <div class="ev-stat amber"><strong>${pendientes}</strong>Pendientes</div>
        <div class="ev-stat green"><strong>$${fmt(s.monto_rendido)}</strong>Recaudado</div>
        <div class="ev-stat purple"><strong>${s.por_venta||0}</strong>Por venta</div>
        <div class="ev-stat amber"><strong>${s.por_ganancia||0}</strong>Por ganancia</div>
      </div>
      <div style="margin-bottom:10px">${entregasHtml}</div>
      <div class="ev-actions">
        <button class="btn btn-sm btn-primary" onclick="abrirEntrega(${ev.id})">🎟️ Entregar tarjetas</button>
        <button class="btn btn-sm" onclick="verReporte(${ev.id})">📊 Reporte</button>
      </div>
    </div>`;
  }).join('');
}

// ── Nuevo / Editar Evento ────────────────────────────────────────────────────

function abrirNuevoEvento(){
  document.getElementById('ev-id').value='';
  document.getElementById('ev-modal-titulo').textContent='Nuevo evento';
  ['ev-nombre','ev-fecha','ev-desc','ev-precio','ev-ganancia'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('ev-tipo').value='Rifas';
  document.getElementById('modal-evento').classList.add('open');
}

async function editarEvento(id){
  var evs = await API.get('/api/eventos');
  var ev = evs.find(e=>e.id===id); if(!ev) return;
  document.getElementById('ev-id').value=id;
  document.getElementById('ev-modal-titulo').textContent='Editar evento';
  document.getElementById('ev-nombre').value=ev.nombre;
  document.getElementById('ev-fecha').value=ev.fecha||'';
  document.getElementById('ev-tipo').value=ev.tipo;
  document.getElementById('ev-desc').value=ev.descripcion||'';
  document.getElementById('ev-precio').value=ev.precio_tarjeta||'';
  document.getElementById('ev-ganancia').value=ev.ganancia_tarjeta||'';
  document.getElementById('modal-evento').classList.add('open');
}

async function guardarEvento(){
  var id = document.getElementById('ev-id').value;
  var body = {
    nombre: document.getElementById('ev-nombre').value.trim(),
    fecha: document.getElementById('ev-fecha').value,
    tipo: document.getElementById('ev-tipo').value,
    descripcion: document.getElementById('ev-desc').value,
    precio_tarjeta: parseFloat(document.getElementById('ev-precio').value)||0,
    ganancia_tarjeta: parseFloat(document.getElementById('ev-ganancia').value)||0,
  };
  if(!body.nombre){ showToast('Ingresá el nombre del evento','error'); return; }
  try {
    if(id) await API.put('/api/eventos/'+id, body);
    else await API.post('/api/eventos', body);
    cerrar('modal-evento');
    cargarEventos();
    showToast(id?'Evento actualizado':'Evento creado');
  } catch(e){ showToast(e.message,'error'); }
}

// ── Entrega de Tarjetas ───────────────────────────────────────────────────────

function abrirEntrega(evId){
  document.getElementById('ent-evento-id').value=evId;
  document.getElementById('ent-alumno').value='';
  document.getElementById('ent-desde').value='';
  document.getElementById('ent-hasta').value='';
  document.getElementById('ent-preview').textContent='';
  document.getElementById('modal-entrega').classList.add('open');
}

function calcCantidad(){
  var d=parseInt(document.getElementById('ent-desde').value)||0;
  var h=parseInt(document.getElementById('ent-hasta').value)||0;
  if(d>0&&h>=d){
    document.getElementById('ent-preview').textContent=`Se asignarán ${h-d+1} tarjetas (del ${d} al ${h})`;
  } else {
    document.getElementById('ent-preview').textContent='';
  }
}

async function confirmarEntrega(){
  var evId=parseInt(document.getElementById('ent-evento-id').value);
  var alumnoId=document.getElementById('ent-alumno').value;
  var desde=document.getElementById('ent-desde').value;
  var hasta=document.getElementById('ent-hasta').value;
  if(!alumnoId||!desde||!hasta){ showToast('Completá todos los campos','error'); return; }
  try {
    var r=await API.post('/api/eventos/'+evId+'/entregas', {alumno_id:parseInt(alumnoId), tarjeta_desde:parseInt(desde), tarjeta_hasta:parseInt(hasta)});
    cerrar('modal-entrega');
    cargarEventos();
    showToast(`${r.cantidad} tarjetas entregadas`);
  } catch(e){ showToast(e.message,'error'); }
}

async function eliminarEntrega(evId, entregaId){
  if(!confirm('¿Eliminar esta entrega? Solo se puede si no hay tarjetas rendidas.')) return;
  try {
    await API.delete('/api/eventos/'+evId+'/entregas/'+entregaId);
    cargarEventos();
    showToast('Entrega eliminada');
  } catch(e){ showToast(e.message,'error'); }
}

// ── Rendición ─────────────────────────────────────────────────────────────────

async function abrirRendicion(evId, alumnoId){
  eventoEnRendicion = evId;
  seleccionados = new Set();
  try {
    var tarjetas = await API.get('/api/eventos/'+evId+'/tarjetas?alumno_id='+alumnoId);
    tarjetasEnRendicion = tarjetas;
    var alumno = alumnosLista.find(a=>a.id===alumnoId);
    var evs = await API.get('/api/eventos');
    var ev = evs.find(e=>e.id===evId);
    document.getElementById('rend-titulo').textContent='Rendición – '+(alumno?alumno.apellido+', '+alumno.nombre:'');
    document.getElementById('rend-alumno-info').textContent=
      'Evento: '+ev.nombre+' · Precio tarjeta: $'+fmt(ev.precio_tarjeta)+' · Ganancia: $'+fmt(ev.ganancia_tarjeta);
    renderGrilla();
    document.getElementById('modal-rendicion').classList.add('open');
  } catch(e){ showToast(e.message,'error'); }
}

function renderGrilla(){
  var grid = document.getElementById('rend-grid');
  grid.innerHTML = tarjetasEnRendicion.map(t => {
    var cls = t.rendida ? (t.tipo_rendicion==='venta'?'venta':'ganancia') : 'libre';
    var sel = seleccionados.has(t.id) ? ' seleccionado' : '';
    var title = t.rendida ? ('Rendida por '+t.tipo_rendicion+' – $'+fmt(t.monto_rendido)) : 'Sin rendir – clic para seleccionar';
    return `<div class="tarj-chip ${cls}${sel}" title="${title}" onclick="toggleSeleccion(${t.id})">${t.numero}</div>`;
  }).join('');
  actualizarBarraSeleccion();
}

function toggleSeleccion(id){
  var t = tarjetasEnRendicion.find(x=>x.id===id);
  if(!t) return;
  if(seleccionados.has(id)) seleccionados.delete(id);
  else seleccionados.add(id);
  renderGrilla();
}

function actualizarBarraSeleccion(){
  var bar = document.getElementById('rend-seleccion');
  var info = document.getElementById('rend-seleccion-info');
  if(seleccionados.size>0){
    bar.style.display='';
    var nums = tarjetasEnRendicion.filter(t=>seleccionados.has(t.id)).map(t=>t.numero).join(', ');
    info.textContent=seleccionados.size+' tarjeta'+(seleccionados.size>1?'s':'')+' seleccionada'+(seleccionados.size>1?'s':'')+': N° '+nums;
  } else {
    bar.style.display='none';
  }
}

async function rendirSeleccionados(tipo){
  if(!seleccionados.size){ showToast('Seleccioná al menos una tarjeta','error'); return; }
  var forma = document.getElementById('rend-forma').value;
  try {
    await API.post('/api/eventos/'+eventoEnRendicion+'/tarjetas/rendir-lote', {
      ids: Array.from(seleccionados), tipo_rendicion: tipo, forma_pago: forma
    });
    // Recargar tarjetas del alumno actual
    var t0 = tarjetasEnRendicion[0];
    var nuevas = await API.get('/api/eventos/'+eventoEnRendicion+'/tarjetas?alumno_id='+t0.alumno_id);
    tarjetasEnRendicion = nuevas;
    seleccionados = new Set();
    renderGrilla();
    cargarEventos();
    var label = tipo==='venta' ? 'por venta' : 'por ganancia';
    showToast('Tarjetas rendidas '+label);
  } catch(e){ showToast(e.message,'error'); }
}

async function desmarcarSeleccionados(){
  if(!seleccionados.size) return;
  try {
    for(var id of seleccionados){
      await API.patch('/api/eventos/'+eventoEnRendicion+'/tarjetas/'+id+'/rendir', {rendida:false});
    }
    var t0 = tarjetasEnRendicion[0];
    var nuevas = await API.get('/api/eventos/'+eventoEnRendicion+'/tarjetas?alumno_id='+t0.alumno_id);
    tarjetasEnRendicion = nuevas;
    seleccionados = new Set();
    renderGrilla();
    cargarEventos();
    showToast('Tarjetas desmarcadas');
  } catch(e){ showToast(e.message,'error'); }
}

// ── Reporte ───────────────────────────────────────────────────────────────────

async function verReporte(evId){
  try {
    var r = await API.get('/api/eventos/'+evId+'/reporte');
    document.getElementById('rpt-titulo').textContent='Reporte: '+r.evento.nombre;
    var html='';
    html+=`<div class="rpt-grid">
      <div class="rpt-stat blue"><div class="val">${r.total_tarjetas_entregadas}</div><div class="lbl">Tarjetas entregadas</div></div>
      <div class="rpt-stat green"><div class="val">${r.rendidas.cantidad}</div><div class="lbl">Rendidas</div></div>
      <div class="rpt-stat amber"><div class="val">${r.pendientes.cantidad}</div><div class="lbl">Pendientes</div></div>
      <div class="rpt-stat green"><div class="val">$${fmt(r.rendidas.monto_total)}</div><div class="lbl">Total recaudado</div></div>
    </div>`;

    html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div style="background:rgba(16,185,129,.08);border:1px solid var(--green);border-radius:8px;padding:12px">
        <div style="font-size:12px;color:var(--green);font-weight:600;margin-bottom:4px">✅ Rendidas por venta</div>
        <div style="font-size:20px;font-weight:800;font-family:'Syne',sans-serif">${r.rendidas.por_venta.cantidad} tarjetas</div>
        <div style="font-size:13px;color:var(--text-3)">$${fmt(r.rendidas.por_venta.monto)}</div>
        ${r.rendidas.por_venta.numeros.length ? '<div class="nums-pendientes">'+r.rendidas.por_venta.numeros.map(n=>'<span class="num-badge rendido">'+n+'</span>').join('')+'</div>' : ''}
      </div>
      <div style="background:rgba(245,158,11,.08);border:1px solid var(--amber);border-radius:8px;padding:12px">
        <div style="font-size:12px;color:var(--amber);font-weight:600;margin-bottom:4px">💰 Rendidas por ganancia</div>
        <div style="font-size:20px;font-weight:800;font-family:'Syne',sans-serif">${r.rendidas.por_ganancia.cantidad} tarjetas</div>
        <div style="font-size:13px;color:var(--text-3)">$${fmt(r.rendidas.por_ganancia.monto)}</div>
        ${r.rendidas.por_ganancia.numeros.length ? '<div class="nums-pendientes">'+r.rendidas.por_ganancia.numeros.map(n=>'<span class="num-badge">'+n+'</span>').join('')+'</div>' : ''}
      </div>
    </div>`;

    if(r.pendientes.cantidad>0){
      html+=`<div style="background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:12px;margin-bottom:14px">
        <div style="font-size:12px;color:var(--red);font-weight:600;margin-bottom:8px">⏳ Pendientes de rendición (${r.pendientes.cantidad} tarjetas)</div>`;
      r.pendientes.por_alumno.forEach(function(a){
        html+=`<div style="margin-bottom:6px"><span style="font-size:13px;font-weight:600">${a.alumno_txt}</span>
          <div class="nums-pendientes">${a.numeros.map(n=>'<span class="num-badge">'+n+'</span>').join('')}</div></div>`;
      });
      html+='</div>';
    }

    html+=`<div style="font-size:12px;color:var(--text-3)">
      Monto potencial si todo se vende: <strong>$${fmt(r.pendientes.monto_estimado_venta + r.rendidas.monto_total)}</strong><br>
      Monto potencial si todo rinde ganancia: <strong>$${fmt(r.pendientes.monto_estimado_ganancia + r.rendidas.monto_total)}</strong>
    </div>`;

    document.getElementById('rpt-body').innerHTML=html;
    document.getElementById('modal-reporte').classList.add('open');
  } catch(e){ showToast(e.message,'error'); }
}

function cerrar(id){ document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open')});
});

async function init(){ await cargarAlumnos(); cargarEventos(); }
init();
</script>
</body>
</html>
