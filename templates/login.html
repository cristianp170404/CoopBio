<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingreso – Cooperadora Escolar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css">
<style>
  body{background:var(--bg-body,#020617);display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;font-family:'DM Sans',system-ui,sans-serif}
  .login-shell{width:100%;max-width:420px;padding:24px}
  .login-card{background:var(--bg-elevated,#020617);border-radius:16px;border:1px solid var(--border,#1f2937);padding:24px 22px;box-shadow:0 18px 40px rgba(15,23,42,.5)}
  .login-title{font-family:'Syne',system-ui,sans-serif;font-size:24px;font-weight:800;margin:0 0 4px}
  .login-sub{color:var(--text-3,#9ca3af);font-size:14px;margin-bottom:16px}
  .login-footer{margin-top:16px;font-size:12px;color:var(--text-3,#9ca3af);display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>
<div class="login-shell">
  <div class="login-card">
    <h1 class="login-title">Cooperadora escolar</h1>
    <p class="login-sub">Ingresá con tu usuario para acceder al panel.</p>
    <div class="form-group"><label class="form-label">Email</label><input id="login-email" type="email" autocomplete="username"></div>
    <div class="form-group"><label class="form-label">Clave</label><input id="login-pass" type="password" autocomplete="current-password"></div>
    <div style="display:flex;gap:8px;margin-top:6px"><button class="btn btn-primary" style="flex:1" onclick="login()">Entrar</button></div>
    <div id="login-msg" style="margin-top:10px;font-size:13px;color:var(--text-3)"></div>
    <div class="login-footer">
      <span>Ciclo lectivo 2026</span>
      <a href="usuarios.html" style="color:var(--blue,#3b82f6);text-decoration:none;font-size:12px">Administrar usuarios →</a>
    </div>
  </div>
</div>
<div id="toast"></div>
<script src="/static/api.js"></script>
<script>
async function login(){
  var e=document.getElementById('login-email').value.trim();
  var p=document.getElementById('login-pass').value;
  if(!e||!p){showToast('Ingresá email y clave','error');return;}
  try{
    var r=await API.post('/api/login',{email:e,password:p});
    localStorage.setItem('user',JSON.stringify(r));
    document.getElementById('login-msg').textContent='Sesión iniciada como '+r.email;
    window.location.href='index.html';
  }catch(err){
    document.getElementById('login-msg').textContent='';
    showToast(err.message,'error');
  }
}
</script>
</body>
</html>
