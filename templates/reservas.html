<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reservas – Cooperadora Escolar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="layout">
  <main class="main-content">
    <header class="topbar">
      <div><h1 class="page-title">Reservas y ventas</h1><p class="page-subtitle">Prendas reservadas con seña y saldo pendiente</p></div>
      <div class="topbar-actions"><button class="btn btn-primary" onclick="abrirModalReserva()">+ Nueva reserva</button></div>
    </header>
    <div class="page-content">
      <div class="filter-bar">
        <input type="search" id="buscar" placeholder="Buscar por alumno o prenda..." oninput="filtrar()" style="max-width:260px">
        <select id="filtro-estado" onchange="filtrar()" style="max-width:160px">
          <option value="">Todos los estados</option>
          <option value="Con sena">Con seña</option>
          <option value="Pagado">Pagado</option>
          <option value="Entregado">Entregado</option>
        </select>
      </div>
      <div class="card" style="margin:0;padding:0;overflow:hidden">
        <table class="table">
          <thead><tr><th>Alumno</th><th>Prenda</th><th>Precio</th><th>Entregado</th><th>Saldo</th><th>Forma pago</th><th>Estado</th><th style="width:170px"></th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- MODAL NUEVA RESERVA -->
<div class="modal-overlay" id="modal-reserva">
  <div class="modal">
    <div class="modal-title">Nueva reserva</div>
    <div class="form-group"><label class="form-label">Alumno *</label>
      <select id="r-alumno"><option value="">Seleccionar alumno...</option></select>
    </div>
    <div class="form-group"><label class="form-label">Tel. tutor (WhatsApp)</label>
      <input type="tel" id="r-tel" placeholder="Se completa automáticamente">
    </div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Prenda *</label>
        <select id="r-prenda"><option value="">Seleccionar prenda...</option></select>
      </div>
      <div class="form-group"><label class="form-label">Precio ($) *</label>
        <input type="number" id="r-precio" min="0" oninput="calcSaldo()">
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Seña ($)</label>
        <input type="number" id="r-sena" min="0" value="0" oninput="calcSaldo()">
      </div>
      <div class="form-group"><label class="form-label">Forma de pago seña</label>
        <select id="r-forma"><option>Efectivo</option><option>Débito</option><option>Transferencia</option></select>
      </div>
    </div>
    <div id="saldo-preview" style="font-size:13px;color:var(--text-3);margin-bottom:12px"></div>
    <div class="form-group">
      <label class="form-label">¿La prenda ya fue entregada?</label>
      <div style="display:flex;gap:16px;margin-top:6px">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px">
          <input type="radio" name="r-entregado" value="0" checked style="width:auto"> No
        </label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px">
          <input type="radio" name="r-entregado" value="1" style="width:auto"> Sí
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="cerrar('modal-reserva')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarReserva()">Guardar reserva</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="/static/api.js"></script>
<script src="/static/sidebar.js"></script>
<script>
var reservas=[], alumnosLista=[], prendasLista=[];

function fmt(n){return Number(n||0).toLocaleString('es-AR');}

function badge(e){
  if(e==='Con sena') return '<span class="badge badge-amber">Con seña</span>';
  if(e==='Pagado') return '<span class="badge badge-blue">Pagado</span>';
  if(e==='Entregado') return '<span class="badge badge-green">Entregado</span>';
  return '<span class="badge">'+e+'</span>';
}

async function init(){
  [reservas,alumnosLista,prendasLista]=await Promise.all([API.get('/api/reservas'),API.get('/api/alumnos'),API.get('/api/prendas')]);
  var selA=document.getElementById('r-alumno');
  selA.innerHTML='<option value="">Seleccionar alumno...</option>';
  alumnosLista.forEach(a=>selA.innerHTML+=`<option value="${a.id}" data-tel="${a.tel_tutor}">${a.apellido}, ${a.nombre}</option>`);
  selA.onchange=function(){
    var opt=selA.options[selA.selectedIndex];
    document.getElementById('r-tel').value=opt.dataset.tel||'';
  };
  var selP=document.getElementById('r-prenda');
  selP.innerHTML='<option value="">Seleccionar prenda...</option>';
  prendasLista.forEach(p=>{
    selP.innerHTML+=`<option value="${p.id}" data-precio="${p.precio}">${p.nombre} ${p.talle} ${p.color} – $${fmt(p.precio)}</option>`;
  });
  selP.onchange=function(){
    var opt=selP.options[selP.selectedIndex];
    if(opt.dataset.precio) document.getElementById('r-precio').value=opt.dataset.precio;
    calcSaldo();
  };
  filtrar();
}

function calcSaldo(){
  var precio=parseFloat(document.getElementById('r-precio').value)||0;
  var sena=parseFloat(document.getElementById('r-sena').value)||0;
  var saldo=Math.max(0,precio-sena);
  document.getElementById('saldo-preview').textContent=saldo>0?'Saldo pendiente: $'+fmt(saldo):'Pago completo ✓';
}

function filtrar(){
  var q=document.getElementById('buscar').value.toLowerCase();
  var estado=document.getElementById('filtro-estado').value;
  var data=reservas.filter(r=>
    ((r.alumno_txt||'')+(r.prenda_txt||'')).toLowerCase().includes(q)&&
    (!estado||r.estado===estado)
  );
  render(data);
}

function render(data){
  document.getElementById('tbody').innerHTML=data.length
    ?data.map(r=>`<tr>
          <td>${r.alumno_txt||'–'}</td><td>${r.prenda_txt||'–'}</td>
          <td>$${fmt(r.precio)}</td>
          <td style="text-align:center">${r.entregado?'<span style="color:var(--green);font-weight:700'>Sí</span>':'<span style="color:var(--text-3)">No</span>'}</td>
          <td class="${r.saldo>0?'':''}"><strong style="color:${r.saldo>0?'var(--amber)':'var(--green)'}">$${fmt(r.saldo)}</strong></td>
          <td>${r.forma_pago}</td>
          <td>${badge(r.estado)}</td>
          <td style="display:flex;gap:4px;flex-wrap:wrap">
            ${r.estado!=='Entregado'&&r.saldo>0?`<button class="btn btn-sm btn-primary" onclick="abrirCobrarSaldo(${r.id})">Cobrar saldo</button>`:''}
            ${r.estado!=='Entregado'&&r.saldo===0?`<button class="btn btn-sm btn-wa" onclick="marcarEntregado(${r.id})">✓ Entregar</button>`:''}
          </td>
        </tr>`).join('')
    :'<tr><td colspan="8" style="text-align:center;color:var(--text-3);padding:32px">Sin reservas</td></tr>';
}

window.abrirModalReserva = function(){
  document.getElementById('r-alumno').value='';
  document.getElementById('r-tel').value='';
  document.getElementById('r-prenda').value='';
  document.getElementById('r-precio').value='';
  document.getElementById('r-sena').value='0';
  document.querySelector('input[name="r-entregado"][value="0"]').checked=true;
  document.getElementById('saldo-preview').textContent='';
  document.getElementById('modal-reserva').classList.add('open');
}
window.guardarReserva = async function(){
  var alumnoId=document.getElementById('r-alumno').value;
  var prendaId=document.getElementById('r-prenda').value;
  var precio=parseFloat(document.getElementById('r-precio').value)||0;
  var sena=parseFloat(document.getElementById('r-sena').value)||0;
  var forma=document.getElementById('r-forma').value;
  var entregado=parseInt(document.querySelector('input[name="r-entregado"]:checked').value);
  if(!alumnoId||!prendaId||!precio){showToast('Completá alumno, prenda y precio','error');return;}
  var aluOpt=document.getElementById('r-alumno').options[document.getElementById('r-alumno').selectedIndex];
  var prendaOpt=document.getElementById('r-prenda').options[document.getElementById('r-prenda').selectedIndex];
  var alumno_txt=aluOpt.text.replace(/\s*\(.*\)\s*$/,'').trim();
  var prenda_txt=prendaOpt.text.replace(/\s*–.*$/,'').trim();
  var tel=document.getElementById('r-tel').value;
  try{
    await API.post('/api/reservas',{alumno_id:parseInt(alumnoId),prenda_id:parseInt(prendaId),
      alumno_txt,prenda_txt,tel_tutor:tel,precio,sena,forma_pago:forma,entregado});
    cerrar('modal-reserva');
    reservas=await API.get('/api/reservas'); filtrar();
    showToast('Reserva guardada');
  }catch(e){showToast(e.message,'error');}
}

window.abrirCobrarSaldo = async function(id){
  var r = reservas.find(x=>x.id==id);
  if(!r) return;
  var nombre = r.alumno_txt || '';
  var tel = r.tel_tutor || '';
  var saldo = r.saldo || 0;
  var monto=prompt('Cobrar saldo de '+nombre+'\nSaldo pendiente: $'+fmt(saldo)+'\n\nIngresá el monto a cobrar:',saldo);
  if(!monto) return;
  try{
    await API.post('/api/reservas/'+id+'/cobrar-saldo',{monto:parseFloat(monto),forma_pago:'Efectivo'});
    reservas=await API.get('/api/reservas'); filtrar(); showToast('Saldo cobrado');
    if(tel){
      // enviar WA con comprobante simple
      var msg='Se registró un pago de $'+Number(monto).toLocaleString('es-AR')+' para '+nombre;
      abrirWA(tel,msg);
    }
  }catch(e){showToast(e.message,'error');}
}

window.marcarEntregado = async function(id){
  if(!confirm('¿Marcar como entregado?')) return;
  try{
    await API.post('/api/reservas/'+id+'/entregar');
    reservas=await API.get('/api/reservas'); filtrar(); showToast('Marcado como entregado');
  }catch(e){showToast(e.message,'error');}
}

window.cerrar = function(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');}));
init();
</script>
</body>
</html>
